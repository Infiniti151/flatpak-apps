---
name: Trigger COPR
on:
  push:
    branches: [main]
    paths:
      - "**/*.spec"
  workflow_dispatch:

jobs:
  trigger:
    if: github.actor == 'Infiniti151' && 
      startsWith(github.event.head_commit.message, 'chore(')
    runs-on: ubuntu-latest
    steps:
      - name: Extract App Name and Trigger
        run: |
          MSG=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/commits/${{ github.sha }}" \
            | jq -r '.commit.message')

          APP_NAME=$(echo "$MSG" | sed -n 's/.*(\(.*\)).*/\1/p')

          echo -e "\e[1;36m==> Detected update for: $APP_NAME\e[0m"

          BASE_URL=$(echo "${{ secrets.COPR_BASE_WEBHOOK_URL }}" | xargs)          
          FINAL_URL="${BASE_URL%/}/$APP_NAME/"
          
          echo -e "\e[1;36m==> Triggering COPR\e[0m"
          curl -X POST "$FINAL_URL"
