---
name: Trigger COPR Build
on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - app_name: text-compare
            upstream_repo: josephmawa/TextCompare
            provider: github
          - app_name: concessio
            upstream_repo: ronniedroid/concessio
            provider: github
          - app_name: missioncenter
            upstream_repo: mission-center-devs/mission-center
            provider: gitlab
          - app_name: extension-manager
            upstream_repo: mjakeman/extension-manager
            provider: github

    steps:
      - name: Checkout Subdirectory
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          sparse-checkout: |
            ${{ matrix.app_name }}
            README.md

      - name: Get Latest Upstream Tag
        id: upstream
        run: |
          if [ "${{ matrix.provider }}" = "github" ]; then
            TAG=$(curl -s "https://api.github.com/repos/${{ matrix.upstream_repo }}/tags" | jq -r '.[0].name // empty')
          elif [ "${{ matrix.provider }}" = "gitlab" ]; then
            ENCODED=$(echo "${{ matrix.upstream_repo }}" | sed 's/\//%2F/g')
            TAG=$(curl -s "https://gitlab.com/api/v4/projects/${ENCODED}/repository/tags" | jq -r '.[0].name // empty')
          fi
          if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
            echo "Error: Could not fetch tag for ${{ matrix.upstream_repo }}"
            exit 1
          fi
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Check and Trigger COPR Build
        env:
          APP: ${{ matrix.app_name }}
          NEW_VER: ${{ steps.upstream.outputs.version }}
        run: |
          SPEC="$APP/$APP.spec"
          README="README.md"

          if [ ! -f "$SPEC" ]; then
            echo -e "\e[1;31m==> Error: $SPEC not found!\e[0m"
            exit 1
          fi

          OLD_VER=$(grep -m1 '^Version:' "$SPEC" | awk '{print $2}')

          if [ "$OLD_VER" != "$NEW_VER" ]; then
            echo -e "\e[1;36m==> Bumping $APP from $OLD_VER to $NEW_VER...\e[0m"

            sed -i "s/^Version:.*/Version:        $NEW_VER/" "$SPEC"

            DATE=$(date +"%a %b %d %Y")
            AUTHOR="Infiniti151 <43163551+Infiniti151@users.noreply.github.com>"

            echo "* $DATE $AUTHOR - $NEW_VER-1" > entry.tmp
            echo "- Update to $NEW_VER" >> entry.tmp
            echo "" >> entry.tmp

            if grep -q "^%changelog" "$SPEC"; then
                sed -i "/^%changelog/r entry.tmp" "$SPEC"
            else
                printf "\n%%changelog\n" >> "$SPEC"
                cat entry.tmp >> "$SPEC"
            fi

            rm entry.tmp

            if [ -f "$README" ]; then
               sed -i "/| $APP[^|]*|/ s/| [0-9.]* |/| $NEW_VER |/" "$README"
            fi

            git config --global user.name "github-actions[bot]"
            git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add "$SPEC" "$README"
            git commit -m "chore($APP): bump version to $NEW_VER"
            git pull --rebase --autostash
            git push

            sleep 5

            BASE_URL=$(echo "${{ secrets.COPR_BASE_WEBHOOK_URL }}" | xargs)
            FINAL_URL="${BASE_URL%/}/$APP/"

            echo -e "\e[1;36m==> Triggering COPR for $APP...\e[0m"
            curl -s -X POST "$FINAL_URL"
          else
            echo -e "\e[1;32m==> $APP is already up to date ($OLD_VER).\e[0m"
          fi
