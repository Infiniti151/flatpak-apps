---
name: Trigger COPR
on:
  push:
    branches: [main]
    paths:
      - "**/*.spec"

jobs:
  trigger:
    if: github.actor == 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Extract App Name and Trigger
        run: |
          MSG=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/commits/${{ github.sha }}" \
            | jq -r '.commit.message')

          APP_NAME=$(echo "$MSG" | sed -n 's/.*(\(.*\)).*/\1/p')

          echo "Detected update for: $APP_NAME"

          curl -X POST "${{ secrets.COPR_BASE_WEBHOOK_URL }}/$APP_NAME/"
