---
name: Test RPM Build

on:
  workflow_dispatch:
  push:
    branches:
      - dev

jobs:
  build:
    runs-on: ubuntu-latest
    environment: Test

    container:
      image: fedora:${{ vars.VER }}

    env:
      # --- Rust / sccache ---
      RUSTC_WRAPPER: sccache
      CARGO_INCREMENTAL: "0"
      SCCACHE_DIR: ${{ github.workspace }}/.sccache
      SCCACHE_GHA_ENABLED: "true"
      SCCACHE_PATH_TRANSFORM: "true"
      
      # --- C/C++ / ccache ---
      CC: "ccache clang"
      CXX: "ccache clang++"
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_COMPILERCHECK: content
      
      # --- Global ---
      DNF_OPT: "--color=always -y --setopt=max_parallel_downloads=10 --setopt=deltarpm=false"
      TERM: xterm-256color
      FORCE_COLOR: "1"
      CFLAGS: "-fcolor-diagnostics"
      CXXFLAGS: "-fcolor-diagnostics"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          submodules: false

      - name: Unified Cache (Rust, C, and Tools)
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "fedora-build-cache"
          cache-on-failure: "true"
          cache-targets: "false"
          cache-directories: |
            .sccache
            .ccache

      - name: Install Build Tools and Dependencies
        run: |
          dnf install $DNF_OPT 'dnf-command(builddep)' rpm-build rpmdevtools git nodejs ccache sccache
          cd "${{ vars.APP }}"
          dnf builddep $DNF_OPT *.spec

      - name: Start sccache
        run: sccache --start-server

      - name: Execute RPM Build
        run: |
          cd "${{ vars.APP }}"
          spectool -g *.spec

          rpmbuild -ba *.spec \
            --define "_topdir $GITHUB_WORKSPACE/rpmbuild" \
            --define "_sourcedir $(pwd)"
        env:
          GIT_CONFIG_COUNT: 1
          GIT_CONFIG_KEY_0: safe.directory
          GIT_CONFIG_VALUE_0: "*"

      - name: Show Performance Stats
        if: always()
        run: |
          sccache --show-stats
          ccache -s

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ vars.APP }}-fc${{ vars.VER }}-rpm
          path: |
            rpmbuild/RPMS/*/*.rpm
            rpmbuild/SRPMS/*.rpm
