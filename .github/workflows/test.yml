---
name: Test RPM Build

on:
  workflow_dispatch:
  push:
    branches:
      - dev

jobs:
  build:
    runs-on: ubuntu-latest
    environment: Test

    container:
      image: fedora:44

    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_COMPILERCHECK: content
      CC: "ccache clang"
      CXX: "ccache clang++"
      TERM: xterm-256color
      CFLAGS: "-fcolor-diagnostics"
      CXXFLAGS: "-fcolor-diagnostics"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          submodules: false

      - name: Install Build Tools
        run: |
          dnf install $DNF_OPT -y 'dnf-command(builddep)' rpm-build rpmdevtools git nodejs ccache

      - name: Restore Ccache
        uses: actions/cache/restore@v5
        id: cache-restore
        with:
          path: .ccache
          key: ccache-fedora-llvm-${{ github.sha }}
          restore-keys: |
            ccache-fedora-llvm-${{ github.ref_name }}-
            ccache-fedora-llvm-

      - name: Install Dependencies for ${{ vars.APP }}
        run: |
          cd "${{ vars.APP }}"
          dnf builddep $DNF_OPT -y *.spec

      - name: Execute RPM Build
        run: |
          cd "${{ vars.APP }}"
          spectool -g *.spec

          rpmbuild -ba *.spec \
            --define "_topdir $GITHUB_WORKSPACE/rpmbuild" \
            --define "_sourcedir $(pwd)"
        env:
          GIT_CONFIG_COUNT: 1
          GIT_CONFIG_KEY_0: safe.directory
          GIT_CONFIG_VALUE_0: "*"

      - name: Save Ccache
        if: always()
        uses: actions/cache/save@v5
        with:
          path: .ccache
          key: ${{ steps.cache-restore.outputs.cache-primary-key }}

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ vars.APP }}-fc44-rpm
          path: |
            rpmbuild/RPMS/*/*.rpm
            rpmbuild/SRPMS/*.rpm
